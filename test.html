<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Sports League - Quick Links</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #7b2ff7;
            --dark: #0a0e27;
            --gradient-1: linear-gradient(135deg, #00d4ff 0%, #7b2ff7 100%);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--dark);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 600px;
        }

        .test-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
        }

        .test-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-1);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }

        .link-grid {
            display: grid;
            gap: 15px;
        }

        .test-link {
            background: var(--gradient-1);
            color: white;
            text-decoration: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .test-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.5);
            color: white;
        }

        .test-link i {
            transition: transform 0.3s;
        }

        .test-link:hover i {
            transform: translateX(5px);
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    
    <div class="container">
        <div class="test-card">
            <h1><i class="fas fa-gamepad me-3"></i>E-Sports League</h1>
            <p>Quick access to all pages</p>
            
            <div class="link-grid">
                <a href="index.html" class="test-link">
                    <span><i class="fas fa-home me-2"></i>Home Page</span>
                    <i class="fas fa-arrow-right"></i>
                </a>
                
                <a href="admin_login.html" class="test-link">
                    <span><i class="fas fa-shield-alt me-2"></i>Admin Login</span>
                    <i class="fas fa-arrow-right"></i>
                </a>
                
                <a href="register_form.html" class="test-link">
                    <span><i class="fas fa-gift me-2"></i>Register for Merch</span>
                    <i class="fas fa-arrow-right"></i>
                </a>
                
                <a href="admin_menu.php" class="test-link">
                    <span><i class="fas fa-tachometer-alt me-2"></i>Admin Dashboard</span>
                    <i class="fas fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
