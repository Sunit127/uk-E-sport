
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register for Merchandise - E-Sports League</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #7b2ff7;
            --accent: #ff006e;
            --success: #00ffc8;
            --dark: #0a0e27;
            --light: #ffffff;
            --gradient-1: linear-gradient(135deg, #00d4ff 0%, #7b2ff7 100%);
            --gradient-2: linear-gradient(135deg, #ff006e 0%, #7b2ff7 100%);
            --gradient-3: linear-gradient(135deg, #00ffc8 0%, #00d4ff 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--dark);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at 25% 35%, rgba(0, 212, 255, 0.12) 0%, transparent 50%),
                        radial-gradient(circle at 75% 65%, rgba(255, 0, 110, 0.12) 0%, transparent 50%);
            animation: bg-pulse 20s ease infinite;
        }

        @keyframes bg-pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        /* Grid Pattern */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: grid-drift 25s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes grid-drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: particle-rise 12s infinite ease-in-out;
        }

        @keyframes particle-rise {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            15% { opacity: 0.8; }
            85% { opacity: 0.8; }
            100% {
                transform: translateY(-100vh) translateX(80px) scale(1);
                opacity: 0;
            }
        }

        /* Registration Container */
        .register-container {
            position: relative;
            z-index: 10;
            max-width: 550px;
            width: 100%;
            animation: slideIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(60px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Registration Card */
        .register-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 28px;
            padding: 45px 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        }

        .register-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-1);
            animation: glow-pulse 3s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            }
            50% {
                box-shadow: 0 0 40px rgba(0, 212, 255, 0.8);
            }
        }

        .register-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.08), transparent 70%);
            animation: rotate-gradient 25s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate-gradient {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Header */
        .register-header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
            z-index: 1;
        }

        .register-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient-1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            position: relative;
            animation: icon-bounce 2.5s ease-in-out infinite;
            box-shadow: 0 10px 35px rgba(0, 212, 255, 0.5);
        }

        @keyframes icon-bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .register-icon::before {
            content: '';
            position: absolute;
            width: 110%;
            height: 110%;
            border-radius: 20px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            animation: ring-expand 2s ease-out infinite;
        }

        @keyframes ring-expand {
            0% {
                transform: scale(0.9);
                opacity: 1;
            }
            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }

        .register-icon i {
            font-size: 2.5rem;
            color: white;
        }

        .register-header h2 {
            font-size: 2rem;
            font-weight: 900;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .register-header p {
            color: rgba(255, 255, 255, 0.6);
        }

        /* Progress Dots */
        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .progress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .progress-dot.active {
            background: var(--gradient-1);
            transform: scale(1.3);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.8);
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 22px;
            position: relative;
            z-index: 1;
        }

        .form-label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
font-weight: 600;
margin-bottom: 10px;
font-size: 0.9rem;
text-transform: uppercase;
letter-spacing: 0.5px;
display: flex;
align-items: center;
gap: 8px;
}

    .form-label i {
        color: var(--primary);
    }

    .input-wrapper {
        position: relative;
    }

    .form-control {
        width: 100%;
        padding: 15px 18px;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(0, 212, 255, 0.2);
        border-radius: 14px;
        color: var(--light);
        font-size: 1rem;
        transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .form-control::placeholder {
        color: rgba(255, 255, 255, 0.3);
    }

    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.1),
                    0 5px 20px rgba(0, 212, 255, 0.3);
        transform: translateY(-2px);
    }

    .form-control.is-valid {
        border-color: var(--success);
        background: rgba(0, 255, 200, 0.05);
    }

    .form-control.is-invalid {
        border-color: var(--accent);
        background: rgba(255, 0, 110, 0.05);
        animation: shake 0.5s;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
    }

    /* Feedback Messages */
    .valid-feedback,
    .invalid-feedback {
        display: none;
        font-size: 0.85rem;
        margin-top: 8px;
        font-weight: 500;
    }

    .valid-feedback {
        color: var(--success);
    }

    .invalid-feedback {
        color: var(--accent);
    }

    .form-control.is-valid ~ .valid-feedback {
        display: flex;
        align-items: center;
        gap: 5px;
        animation: fadeInUp 0.3s;
    }

    .form-control.is-invalid ~ .invalid-feedback {
        display: flex;
        align-items: center;
        gap: 5px;
        animation: fadeInUp 0.3s;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Checkbox */
    .checkbox-wrapper {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(0, 212, 255, 0.2);
        border-radius: 14px;
        cursor: pointer;
        transition: all 0.3s;
    }

    .checkbox-wrapper:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(0, 212, 255, 0.4);
        transform: translateX(5px);
    }

    .form-check-input {
        width: 24px;
        height: 24px;
        cursor: pointer;
        border: 2px solid var(--primary);
        margin: 0;
        flex-shrink: 0;
        background: transparent;
        transition: all 0.3s;
    }

    .form-check-input:checked {
        background-color: var(--primary);
        border-color: var(--primary);
        animation: checkbox-pop 0.3s;
    }

    @keyframes checkbox-pop {
        0% { transform: scale(0.8); }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); }
    }

    .form-check-label {
        cursor: pointer;
        color: rgba(255, 255, 255, 0.8);
        font-weight: 500;
    }

    /* Buttons */
    .btn-submit {
        width: 100%;
        padding: 18px;
        background: var(--gradient-1);
        border: none;
        border-radius: 14px;
        color: white;
        font-size: 1.1rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: all 0.4s;
        box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        margin-bottom: 18px;
    }

    .btn-submit::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
    }

    .btn-submit:hover::before {
        width: 400px;
        height: 400px;
    }

    .btn-submit:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(0, 212, 255, 0.6);
    }

    .btn-submit span {
        position: relative;
        z-index: 1;
    }

    .btn-submit.loading {
        pointer-events: none;
        opacity: 0.8;
    }

    .btn-submit.loading span {
        opacity: 0;
    }

    .btn-submit.loading::after {
        content: '';
        position: absolute;
        width: 24px;
        height: 24px;
        top: 50%;
        left: 50%;
        margin: -12px 0 0 -12px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .btn-back {
        width: 100%;
        padding: 16px;
        background: transparent;
        border: 2px solid rgba(0, 212, 255, 0.3);
        border-radius: 14px;
        color: var(--primary);
        font-size: 1rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        text-align: center;
        transition: all 0.4s;
        position: relative;
        overflow: hidden;
    }

    .btn-back::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        background: var(--primary);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
    }

    .btn-back:hover::before {
        width: 400px;
        height: 400px;
    }

    .btn-back:hover {
        color: var(--dark);
        border-color: var(--primary);
        box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
    }

    .btn-back span {
        position: relative;
        z-index: 1;
    }

    /* Divider */
    .divider {
        text-align: center;
        margin: 25px 0;
        position: relative;
    }

    .divider::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(0, 212, 255, 0.3), transparent);
    }

    .divider span {
        background: var(--dark);
        padding: 0 20px;
        position: relative;
        color: rgba(255, 255, 255, 0.5);
        font-weight: 600;
        font-size: 0.9rem;
    }

    /* Success Message */
    .success-message {
        display: none;
        background: rgba(0, 255, 200, 0.1);
        border: 2px solid var(--success);
        border-radius: 14px;
        padding: 15px 20px;
        margin-bottom: 20px;
        color: var(--success);
        animation: successSlide 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes successSlide {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Responsive */
    @media (max-width: 576px) {
        .register-card {
            padding: 35px 28px;
        }
        .register-icon {
            width: 70px;
            height: 70px;
        }
        .register-icon i {
            font-size: 2.2rem;
        }
        .register-header h2 {
            font-size: 1.7rem;
        }
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Create particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 35; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        const size = Math.random() * 4 + 2;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.background = `rgba(0, 212, 255, ${Math.random() * 0.5 + 0.3})`;
        particle.style.animationDelay = Math.random() * 12 + 's';
        particle.style.animationDuration = (Math.random() * 8 + 10) + 's';
        particlesContainer.appendChild(particle);
    }

    // Form elements
    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    const progressDots = document.querySelectorAll('.progress-dot');
    const inputs = form.querySelectorAll('input[type="text"], input[type="email"]');
    const checkbox = document.getElementById('terms');

    // Update progress dots
    function updateProgress() {
        let count = 0;
        inputs.forEach(input => {
            if (input.value.trim() && input.validity.valid) count++;
        });
        if (checkbox.checked) count++;
        
        progressDots.forEach((dot, i) => {
            setTimeout(() => {
                dot.classList.toggle('active', i < count);
            }, i * 100);
        });
    }

    // Real-time validation
    inputs.forEach(input => {
        input.addEventListener('input', function() {
            if (this.value.trim()) {
                if (this.validity.valid) {
                    this.classList.remove('is-invalid');
                    this.classList.add('is-valid');
                } else {
                    this.classList.remove('is-valid');
                    this.classList.add('is-invalid');
                }
            } else {
                this.classList.remove('is-valid', 'is-invalid');
            }
            updateProgress();
        });

        input.addEventListener('blur', function() {
            if (!this.value.trim() && this.required) {
                this.classList.add('is-invalid');
            }
        });

        input.addEventListener('focus', function() {
            this.parentElement.style.transform = 'scale(1.02)';
        });

        input.addEventListener('blur', function() {
            this.parentElement.style.transform = 'scale(1)';
        });
    });

    // Checkbox validation
    checkbox.addEventListener('change', function() {
        updateProgress();
        if (this.checked) {
            this.classList.remove('is-invalid');
            const feedback = this.parentElement.nextElementSibling;
            if (feedback) feedback.style.display = 'none';
        }
    });

    // Form submission
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        let valid = true;

        inputs.forEach(input => {
            if (!input.validity.valid || !input.value.trim()) {
                input.classList.add('is-invalid');
                input.classList.remove('is-valid');
                valid = false;
            } else {
                input.classList.remove('is-invalid');
                input.classList.add('is-valid');
            }
        });

        if (!checkbox.checked) {
            const feedback = checkbox.parentElement.nextElementSibling;
            if (feedback) feedback.style.display = 'flex';
            valid = false;
        }

        if (valid) {
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            
            progressDots.forEach((dot, i) => {
                setTimeout(() => {
                    dot.classList.add('active');
                }, i * 150);
            });
            
            setTimeout(() => {
                form.submit();
            }, 1500);
        } else {
            const card = document.querySelector('.register-card');
            card.style.animation = 'shake 0.5s';
            setTimeout(() => {
                card.style.animation = '';
            }, 500);
        }
    });

    // Ripple effect
    function createRipple(event, element) {
        const ripple = document.createElement('span');
        const rect = element.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        const x = event.clientX - rect.left - size / 2;
        const y = event.clientY - rect.top - size / 2;
        
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';
        ripple.style.position = 'absolute';
        ripple.style.borderRadius = '50%';
        ripple.style.background = 'rgba(255, 255, 255, 0.6)';
        ripple.style.transform = 'scale(0)';
        ripple.style.animation = 'ripple 0.6s ease-out';
        ripple.style.pointerEvents = 'none';
        
        element.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
    }

    submitBtn.addEventListener('click', function(e) {
        createRipple(e, this);
    });

    document.querySelector('.btn-back').addEventListener('click', function(e) {
        createRipple(e, this);
    });

    const style = document.createElement('style');
    style.textContent = `
        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    `;
    document.head.appendChild(style);

    // Initialize progress
    updateProgress();

    // Keyboard shortcut
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            window.location.href = 'index.html';
        }
    });
